# This GitHub Action automates the process of building Grafana plugins.
# (For more information, see https://github.com/grafana/plugin-actions/blob/main/build-plugin/README.md)
name: Release

on:
  push:
    tags:
      - 'v*' # Run workflow on version tags, e.g. v1.0.0.

permissions: read-all

jobs:
  release:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: grafana/plugin-actions/build-plugin@build-plugin/v1.2.0
        with:
          # build-plugin defaults to Node 20; match the CI build on 22.
          node-version: '22'
          # To sign for the catalog / Grafana Cloud, save the token in repository
          # secrets and uncomment (see the grafana.com plugin-tools signing docs):
          # policy_token: ${{ secrets.GRAFANA_ACCESS_POLICY_TOKEN }}
